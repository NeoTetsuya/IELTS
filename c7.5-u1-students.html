<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Academic Test Simulator - Unit 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-font-size: 17px;
        }
        body {
            font-family: 'Inter', sans-serif;
            overscroll-behavior: none;
            background-color: #f3f4f6;
        }
        .ielts-container {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
        }
        .content-panes {
            display: grid;
            grid-template-columns: 1fr 5px 1fr;
            overflow: hidden;
        }
        .pane {
            overflow-y: auto;
            padding: 2rem 3rem;
            font-size: var(--app-font-size);
            scroll-behavior: smooth;
        }
        #left-pane {
            background-color: #fdfdfd;
        }
        #right-pane {
            background-color: #f8fafc;
        }
        .splitter {
            background-color: #cbd5e1;
            cursor: col-resize;
            z-index: 10;
            transition: background-color 0.2s;
        }
        .splitter:hover, .splitter:active {
            background-color: #94a3b8;
        }
        
        /* Typography Improvements */
        .reading-passage {
            font-family: 'Merriweather', serif;
            line-height: 1.9;
            color: #334155;
            text-align: left;
            margin-bottom: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        .reading-passage p {
            margin-bottom: 1.5rem;
            text-indent: 1.5rem;
        }
        .reading-passage h3 {
            font-family: 'Inter', sans-serif;
            color: #0f172a;
            margin-bottom: 1.5rem;
            font-weight: 700;
            font-size: 1.5em;
            text-align: center;
        }

        /* Question Styles */
        .q-item {
            padding: 1rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }
        
        /* Radio Button Styles */
        .custom-radio-label {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            background-color: white;
        }
        .custom-radio-label:hover {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
        }
        
        /* Input Styles for Fill-in-the-blanks */
        .fill-in-blank {
            border: none;
            border-bottom: 2px dashed #94a3b8;
            background-color: #f8fafc;
            padding: 2px 8px;
            font-weight: 600;
            color: #0f172a;
            width: 180px;
            transition: all 0.2s;
            text-align: center;
            border-radius: 4px 4px 0 0;
            margin: 0 4px;
        }
        .fill-in-blank:focus {
            outline: none;
            border-bottom: 2px solid #2563eb;
            background-color: #eff6ff;
        }

        /* Vocabulary Styles */
        .vocab-word {
            color: #2563eb;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px dotted #93c5fd;
            transition: all 0.2s ease-in-out;
            padding: 0 2px;
        }
        .vocab-word:hover {
            background-color: #dbeafe;
            border-bottom-style: solid;
            border-radius: 2px;
        }

        /* UI Elements */
        .highlight-tooltip {
            position: absolute;
            background-color: #1e293b;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            z-index: 100;
            cursor: pointer;
            display: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        mark {
            background-color: #fef08a;
            border-radius: 3px;
            padding: 2px 0;
        }
        
        @media (max-width: 768px) {
            .content-panes {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 5px 1fr;
            }
            .splitter {
                cursor: row-resize;
            }
            .pane {
                padding: 1rem;
            }
        }
    </style>
</head>

                {
                    title: "The MIT factor: celebrating 150 years of maverick genius",
                    passage: `
                        <h3>The MIT factor: celebrating 150 years of maverick genius</h3>
                        <p class="text-center italic text-gray-500 mb-6">by Ed Pilkington<br>The Massachusetts Institute of Technology has led the world into the future for 150 years with scientific innovations.</p>
                        
                        <p>The musician Yo-Yo Ma’s cello may not be the obvious starting point for a journey into one of the world’s great universities. But, as you quickly realise when you step inside the Massachusetts Institute of Technology, there’s precious little going on that you would normally see on a university campus. The cello, resting in a corner of MIT’s celebrated media laboratory – a hub of creativity – looks like any other electric classical instrument. But it is much more. Machover, the composer, teacher and inventor responsible for its creation, calls it a ‘hyperinstrument’, a sort of thinking machine that allows Ma and his cello to interact with one another and make music together. ‘The aim is to build an instrument worthy of a great musician like Yo-Yo Ma that can understand what he is trying to do and respond to it,’ Machover says. The cello has numerous sensors across its body and by measuring the pressure, speed and angle of the <span class="vocab-word" data-word="virtuoso">virtuoso</span>’s performance it can interpret his mood and engage with it, producing extraordinary new sounds. The virtuoso cellist frequently performs on the instrument as he tours around the world.</p>
                        
                        <p>Machover’s passion for pushing at the boundaries of the existing world to extend and <span class="vocab-word" data-word="unleash">unleash</span> human potential is not a bad description of MIT as a whole. This unusual community brings highly gifted, highly motivated individuals together from a vast range of disciplines, united by a common desire: to leap into the dark and reach for the unknown.</p>
                        
                        <p>The result of that single unifying ambition is visible all around. For the past 150 years, MIT has been leading the world into the future. The discoveries of its teachers and students have become the common everyday objects that we now all take for granted. The telephone, electromagnets, radars, high-speed photography, office photocopiers, cancer treatments, pocket calculators, computers, the Internet, the decoding of the human genome, lasers, space travel … the list of innovations that involved essential contributions from MIT and its faculty goes on and on.</p>
                        
                        <p>From the moment MIT was founded by William Barton Rogers in 1861, it was clear what it was not. While Harvard stuck to the English model of a classical education, with its emphasis on Latin and Greek, MIT looked to the German system of learning based on research and hands-on experimentation. Knowledge was at a premium, but it had to be useful.</p>
                        
                        <p>This down-to-earth quality is enshrined in the school motto, <em>Mens et manus</em> – Mind and hand – as well as its logo, which shows a gowned scholar standing beside an ironmonger bearing a hammer and anvil. That <span class="vocab-word" data-word="symbiosis">symbiosis</span> of intellect and craftsmanship still suffuses the institute’s classrooms, where students are not so much taught as engaged and inspired.</p>
                        
                        <p>Take Christopher Merrill, 21, a third-year undergraduate in computer science. He is spending most of his time on a competition set in his robotics class. The contest is to see which student can most effectively program a robot to build a house out of blocks in under ten minutes. Merrill says he could have gone for the easiest route – designing a simple robot that would build the house quickly. But he wanted to try to master an area of robotics that remains unconquered – adaptability, the ability of the robot to rethink its plans as the environment around it changes, as would a human. ‘I like to take on things that have never been done before rather than to work in an <span class="vocab-word" data-word="iterative">iterative</span> way just making small steps forward,’ he explains.</p>

                        <p>Merrill is already planning the start-up he wants to set up when he graduates in a year’s time. He has an idea for an original version of a contact lens that would <span class="vocab-word" data-word="augment">augment</span> reality by allowing consumers to see additional visual information. He is fearful that he might be just too late in taking his concept to market, as he has heard that a Silicon Valley firm is already developing something similar. As such, he might become one of many MIT graduates who go on to form companies that fail. Alternatively, he might become one of those who go on to succeed in spectacular fashion. And there are many of them. A survey of living MIT alumni* found that they have formed 25,800 companies, employing more than three million people, including about a quarter of the workforce of Silicon Valley.</p>
                        
                        <p>What MIT delights in is taking brilliant minds from around the world in vastly diverse disciplines and putting them together. You can see that in its sparkling new David Koch Institute for Integrative Cancer Research, which brings scientists, engineers and clinicians under one roof. Or in its Energy Initiative, which acts as a bridge for MIT’s combined work across all its five schools, channelling huge resources into the search for a solution to global warming. It works to improve the efficiency of existing energy sources, including nuclear power. It is also forging ahead with alternative energies from solar to wind and geothermal, and has recently developed the use of viruses to <span class="vocab-word" data-word="synthesise">synthesise</span> batteries that could prove crucial in the advancement of electric cars.</p>
                        
                        <p>In the words of Tim Berners-Lee, the Briton who invented the World Wide Web, ‘It’s not just another university. Even though I spend my time with my head buried in the details of web technology, the nice thing is that when I do walk the corridors, I bump into people who are working in other fields with their students that are fascinating, and that keeps me intellectually alive.’</p>
                        <p class="text-sm text-gray-500 italic mt-4">* people who have left a university or college after completing their studies there</p>

                                    <div class="flex flex-wrap gap-3">

                                        <label class="custom-radio-label flex-1 justify-center"><input type="radio" name="s0_q4" value="true" class="mr-2 hidden"><span class="font-semibold text-gray-600">True</span></label>

                        <h3>The University of Life</h3>
                        <p class="text-center italic text-gray-500 mb-6">Katherine Demopoulos meets students who took a break from study to volunteer overseas and returned with a new sense of purpose</p>
                        
                        <p>The majority of 18-year-old students entering higher education go straight from school to university. For many school leavers, however, there is the <span class="vocab-word" data-word="irresistible">irresistible</span> attraction of the 'gap year', a time between school and university when they decide to experience something new, different or exciting. Many of these so-called 'gappers' go off travelling around the world, often <span class="vocab-word" data-word="supplementing">supplementing</span> their limited funds by taking on casual work, while others may do voluntary work in a village in a distant part of the world.</p>
                        
                        <p>For the majority of gappers, the gap year is simply a chance to enjoy life as an independent adult for the first time. Increasingly, however, they are also proving a great way of <span class="vocab-word" data-word="reinvigorating">reinvigorating</span> a lapsed or flagging interest in education, offering a chance to think about why you should study, or if you need to study at all. A growing number of students, having taken a break after school, are heading back into further and higher education via a roundabout route of working and 'gapping'. According to the latest data from the British university admissions service, UCAS, 105,000 students aged 19, and 44,400 aged 20, entered higher education last year — figures that show a steady annual increase in this age group over the previous three years.</p>
                        
                        <p>19-year-old student Christine Samways is a typical example. She left school at 16 with nine good exam passes at grades A to C, but did not want to continue studying at the time. She was also worried that, despite having all the attributes of a good student, she would find the challenges of higher education too great and would be forced to drop out. Instead, she gained a vocational qualification in hairdressing. However, she very quickly began to realise it was not quite what she wanted and that going back into some kind of education could be her next step. Like many 16-year-old school leavers starting work for the first time, it dawned on her that if you don't have qualifications, or the right qualifications, you have fewer work choices. 'The things that you want to do just aren't available to you,' she says.</p>
                        
                        <p>Unsure of what her next step should be, Christine decided to head to Mexico to do voluntary work at a children's home. She was there for a year under the <span class="vocab-word" data-word="auspices">auspices</span> of the International Cultural Youth Exchange (ICYE) — an organisation which has been running since 1949, when it sent 50 German students to the US as peace ambassadors. She never expected that working in Mexico would give her such a sense of confidence and, perhaps just as importantly, direction. On returning home to the UK, she decided to make a fresh start in education by enrolling on a course in Social Sciences and Humanities to prepare herself for university. Her new sense of confidence helped at her college interview. Previously, a formal interview would have made her very nervous, but she now found it much easier to talk on an informal and formal level to people she didn't know. 'l feel more comfortable in these situations,' she says. 'Mexico was the first time I'd been out of my comfort zone. Now I think I can cope with things better.'</p>
                        
                        <p>Christine is now working towards a degree in International Development at Bath University, a choice of subject informed by her experience of working with Mexican children. And, as well as finding some direction in her career, she now speaks good Spanish - a skill she says she intends to keep up, perhaps by working abroad. She knows that the Mexican children's home benefited from her time there, just as she did. As well as being 'an extra pair of hands', she helped to <span class="vocab-word" data-word="streamline">streamline</span> the children's timetable so they spent more structured time on homework. The children began to 'do better in school,' she says. 'You only move up a year if you pass a year — I got four children that at the beginning of the year were told they were going to stay down, but they moved up. Ifs a good feeling.'</p>
                        
                        <p>ICYE also brings students to Europe from the countries that European students traditionally visit. Agnes Eldad, from Kampala, Uganda, has just graduated with a degree in Social Work. She came to the UK in January this year, getting a voluntary work placement relieving full-time carers of elderly people in Bexleyheath, Kent. With her social work background, she wanted to understand how elderly people were treated in Britain and to see for herself how their relationships with their children, grandchildren and in-laws worked.</p>

                        <p>Agnes found the experience extremely beneficial, but says that the ICYE only really works if participants have a focus for what they want to do, see and study. Ironically, for her, this could be the only chance to work with elderly people before she goes back home in January. In Uganda, old people live with, and are supported by, their families, so she won't have an opportunity to work with them. Instead, she now wants to set up her own vocational training programme for young girls in northern Uganda. Agnes says her time in the UK has helped her to set her goals for the future.</p>

                });

                document.body.addEventListener('mousedown', (e) => {
                   if (e.target !== this.highlightTooltip && window.getSelection().toString().length === 0) {
                        this.highlightTooltip.style.display = 'none';
                   }
                });
            }
        };

        app.init();
    });
</script>

</body>
</html>
