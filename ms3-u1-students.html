<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Academic Test Simulator - Unit 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-font-size: 17px;
        }
        body {
            font-family: 'Inter', sans-serif;
            overscroll-behavior: none;
            background-color: #f3f4f6;
        }
        .ielts-container {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
        }
        .content-panes {
            display: grid;
            grid-template-columns: 1fr 5px 1fr;
            overflow: hidden;
        }
        .pane {
            overflow-y: auto;
            padding: 2rem 3rem;
            font-size: var(--app-font-size);
            scroll-behavior: smooth;
        }
        #left-pane {
            background-color: #fdfdfd;
        }
        #right-pane {
            background-color: #f8fafc;
        }
        .splitter {
            background-color: #cbd5e1;
            cursor: col-resize;
            z-index: 10;
            transition: background-color 0.2s;
        }
        .splitter:hover, .splitter:active {
            background-color: #94a3b8;
        }
        
        /* Typography Improvements */
        .reading-passage {
            font-family: 'Merriweather', serif;
            line-height: 1.9;
            color: #334155;
            text-align: left;
            margin-bottom: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        .reading-passage p {
            margin-bottom: 1.5rem;
        }
        .reading-passage h3 {
            font-family: 'Inter', sans-serif;
            color: #0f172a;
            margin-bottom: 1.5rem;
            font-weight: 700;
            font-size: 1.5em;
            text-align: center;
            text-transform: uppercase;
        }

        /* Question Styles */
        .q-item {
            padding: 1rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }
        
        /* Radio Button Styles */
        .custom-radio-label {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            background-color: white;
        }
        .custom-radio-label:hover {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
        }
        
        /* Input Styles for Fill-in-the-blanks */
        .fill-in-blank {
            border: none;
            border-bottom: 2px dashed #94a3b8;
            background-color: #f8fafc;
            padding: 2px 8px;
            font-weight: 600;
            color: #0f172a;
            width: 120px;
            transition: all 0.2s;
            text-align: center;
            border-radius: 4px 4px 0 0;
            margin: 0 4px;
        }
        .fill-in-blank:focus {
            outline: none;
            border-bottom: 2px solid #2563eb;
            background-color: #eff6ff;
        }

        /* Vocabulary Styles */
        .vocab-word {
            color: #2563eb;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px dotted #93c5fd;
            transition: all 0.2s ease-in-out;
            padding: 0 2px;
        }
        .vocab-word:hover {
            background-color: #dbeafe;
            border-bottom-style: solid;
            border-radius: 2px;
        }

        /* Headings List Box */
        .headings-box {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .headings-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        .headings-list li {
            margin-bottom: 0.5rem;
            display: flex;
        }
        .headings-list li span.numeral {
            font-weight: 600;
            color: #475569;
            width: 2.5rem;
            flex-shrink: 0;
        }

        /* UI Elements */
        .highlight-tooltip {
            position: absolute;
            background-color: #1e293b;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            z-index: 100;
            cursor: pointer;
            display: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        mark {
            background-color: #fef08a;
            border-radius: 3px;
            padding: 2px 0;
        }
        
        @media (max-width: 768px) {
            .content-panes {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 5px 1fr;
            }
            .splitter {
                cursor: row-resize;
            }
            .pane {
                padding: 1rem;
            }
        }
    </style>
</head>

                    passage: `
                        <h3>CAHOKIA - ANCESTOR OF TODAY'S CAPITAL CITIES</h3>
                        
                        <p><strong>A</strong> A thousand years ago the Mississippians, a <span class="vocab-word" data-word="diverse">diverse</span> group of Native Americans who lived in the area which is today known as the south-eastern United States, took a small village on the Mississippi River and turned it into one of the world's first great urban centres. Cahokia, as it has been called by archaeologists, became as large as London was in the 11th century, and some would argue that it was just as forward-looking and <span class="vocab-word" data-word="prosperous">prosperous</span> as its European equivalents. Sophisticated, <span class="vocab-word" data-word="cosmopolitan">cosmopolitan</span> and ahead of its time, Cahokia was at the heart of ancient society in North America; an ancestor of today's capital cities.</p>
                        
                        <p><strong>B</strong> In one respect in particular, Cahokia was quite unusual compared to other cities around at the same time. Archaeologists working on the site have found enough evidence over the past fifty years to conclude that, at a certain time, around 35% of the population were not from Cahokia at all; it seems that many of the tribes that lived all along the Mississippi River at some point began to relocate to Cahokia. These researchers have been unable to find more than a handful of other examples of such relocation of tribes, but they do know that something about Cahokia attracted thousands of people to this regional centre. And that, they <span class="vocab-word" data-word="postulated">postulated</span>, appears to have been thanks to a small group of planners who one day decided to redesign the entire village.</p>
                        
                        <p><strong>C</strong> After the redesigns of the village were put in place, the Native Americans at Cahokia worked with tireless determination to carry them out. Over the course of a few decades, they transported huge volumes of soil from the nearby countryside to create 120 huge mounds of earth, the biggest of which rose to one hundred feet. On top of these, they built a vast urban environment, complete with a vibrant town centre, municipal buildings, and a fifty-acre plaza at the foot of the biggest mound. What makes it even more impressive to our modern imaginations is that, with no machinery then, they used their bare hands and woven baskets to dig up and carry the soil from the surrounding regions back to their city-in-waiting. Eventually, after these efforts, the vision of the city planners was fulfilled, but even they could not have predicted how popular Cahokia would become.</p>
                        
                        <p><strong>D</strong> From this period on, Cahokia was alive with intense activity, and grew in size every year, partly because of the co-operation between the residents. While the men busied themselves with manual work, like constructing new buildings, or hunting and fishing in the forests and rivers within a day's walk of the city, the women made sure that the fields stayed healthy and grew crops, and the homes were kept clean. In many ways, it seems to have been the ideal place to live, and one with an exciting and prosperous future ahead of it. And yet, having become a major population centre around AD 1050, by 1350 it had been almost completely <span class="vocab-word" data-word="abandoned">abandoned</span>. Somewhere in the course of 300 years, something happened to Cahokia to cause this, but it is an <span class="vocab-word" data-word="enigma">enigma</span> that even archaeologists or historians themselves struggle to resolve.</p>
                        
                        <p><strong>E</strong> This rather curious state of affairs exists today because researchers have never found a single piece of evidence that can <span class="vocab-word" data-word="conclusively">conclusively</span> explain why the residents left. Academics who have studied other Native American sites have always found weapons of war buried deep underground. And yet, the bows, arrows and swords that littered the ground at these other sites were nowhere to be seen at Cahokia. Other factors, such as disease or colonisation from European invasion, do not seem to be possible in this case, as common as they were elsewhere at that time. The absence of definitive theories as to Cahokia's decline is highly unusual, but then again, Cahokia was no ordinary city and perhaps comparisons with other urban centres of the time cannot be made.</p>
                        
                        <p><strong>F</strong> While academics remain <span class="vocab-word" data-word="bemused">bemused</span> as to why the residents fled the city, we can still marvel at the individual <span class="vocab-word" data-word="artefacts">artefacts</span> that archaeologists have discovered: the jewellery worn, the pots used to cook in, the small workshop at the base of one of the mounds. That said, there is also a more unpleasant side to their investigations. Human sacrifice, it seems, was a common fact of life in Cahokia; even if we cannot be sure whether this was for religious or for other reasons, we can have no doubt that it happened frequently. The bodies of hundreds of people, mostly young women, have been found buried in mass graves, and the way in which they died was often horrific. A <span class="vocab-word" data-word="sombre">sombre</span> reminder that even 'advanced' city states had their shadowy sides.</p>
                    `,
                    questions: `

                },
                // --- SECTION 1: PASSAGE 2 ---
                {
                    title: "The Changing Fate of Cities",
                    passage: `
                        <h3>The Changing Fate of Cities</h3>
                        
                        <p><strong>A</strong> One of the key challenges facing the world is going to be coping with the hundreds of millions who will flock to the growing number of overpopulated megacities, especially in developing countries. This has received a great deal of media attention; books have been written, conferences organised and committees established to debate the causes of urbanisation, and more importantly, what can be done to improve the fate of those making the move into these continually growing <span class="vocab-word" data-word="conurbations">conurbations</span>. But the same is not true of a second, and closely related trend, which raises a serious <span class="vocab-word" data-word="dilemma">dilemma</span>: what to do about the cities that are losing people.</p>
                        
                        <p><strong>B</strong> A drop in a city’s population usually leads to a few empty or boarded-up and unoccupied homes, hardly enough to make the headlines or raise eyebrows. But they’re hardly unusual. One in ten US cities is actually shrinking. In Japan, larger cities are <span class="vocab-word" data-word="thriving">thriving</span> – and growing – while many of the smaller ones are in decline, both <span class="vocab-word" data-word="demographically">demographically</span> and economically. In Latvia, many young adults have turned remarkably anti-provincial and have headed for the capital, Riga, in large numbers, leaving a number of ghost towns. Almost silently, this trend is being repeated right across the globe, almost without anyone noticing. Several South Korean cities are also becoming smaller, and this trend will continue unless birth rates there increase.</p>
                        
                        <p><strong>C</strong> That's just the thing: once a place starts getting smaller, the decline tends to continue. There are several explanations for this. When young adults leave the town of their birth and don’t return, the town loses not just those adults, but also the children that they would have had later had they stayed. As populations drop, the average age of the inhabitants increases until most people are post-childbearing age. This is what has happened to towns like Christchurch in the UK. It’s a vicious cycle; it means, of course, fewer youngsters to bring down the average age, and consequently, the trend gathers <span class="vocab-word" data-word="momentum">momentum</span> and accelerates. Additionally, of course, higher average age is closely linked with increased <span class="vocab-word" data-word="mortality">mortality</span>, with each death further reducing the population.</p>
                        
                        <p><strong>D</strong> Many cities that are now declining relied heavily on a specific industry for the employment of a large portion of the workforce. A classic example is Detroit, once the centre of America’s thriving car industry, but now a sparsely populated urban wasteland. Flint, another ex-industrial powerhouse, can no longer provide the jobs its residents need and so many have left, driven away by unemployment and the prospect of better opportunities elsewhere. For others, a rural life has a greater appeal and this tempts them to leave the city; living in the countryside typically affords lower property prices, healthier living and lower rates of crime.</p>
                        
                        <p><strong>E</strong> It’s this desire to enjoy many of the aspects of an imagined <span class="vocab-word" data-word="utopia">utopia</span> that is prompting many urban dwellers to pack up and move out to the country. Once there, they can grow their own potatoes, have time to talk to their neighbours and not worry about what their kids are up to. Technological changes mean that for many professionals, there’s not so much difference between being in the city and living miles from anywhere, as long as they have a car and a decent internet connection. Many city-to-country migrants, such as Helen Dobson, who recently moved out of Manchester, find that they have to put up with substandard wi-fi anyway – but that’s a different story.</p>
                    `,

                            <div class="space-y-4">

                        <!-- True/False/Not Given -->
                        <div class="mb-8 p-6 bg-white rounded-2xl shadow-sm border border-gray-100">

                            </div>
                            <p class="mb-6 text-gray-700 bg-gray-50 p-4 rounded-lg border border-gray-100">
                                Do the following statements agree with the information in the reading passage?<br><br>
                                <strong>TRUE</strong> if the statement agrees with the information<br>
                                <strong>FALSE</strong> if the statement contradicts the information<br>
                                <strong>NOT GIVEN</strong> if there is no information on this
                            </p>
                            
                            <div class="space-y-8">
                                <div class="q-item" id="container-s1_q6">
                                    <p class="mb-3 text-gray-800 font-medium"><span class="font-bold text-blue-600 mr-2">6</span> Too many people are moving to large cities.</p>

                                    <div class="flex flex-wrap gap-3">

                        <!-- Vocabulary Exercise: Prefix Matching -->
                        <div class="mb-8 p-6 bg-white rounded-2xl shadow-sm border border-gray-100">

                                <span class="bg-blue-100 text-blue-800 text-sm font-bold px-3 py-1 rounded-full mr-3">Questions 9-14</span>
                                <h4 class="font-bold text-gray-800">Prefix Matching</h4>
                            </div>
                            <p class="mb-6 text-gray-700 bg-gray-50 p-4 rounded-lg border border-gray-100">
                                Read the groups of words that begin with the same prefix. Match the meanings with the prefixes.<br>
                                Write the correct prefix in the box. <em>(e.g., type <strong>trans-</strong> or just <strong>trans</strong>)</em>

                            <div class="flex flex-wrap gap-3 mb-6 bg-blue-50 p-4 rounded-lg border border-blue-100 justify-center font-medium text-blue-900">
                                <span>over-</span> &bull; <span>mis-</span> &bull; <span>sub-</span> &bull; <span>fore-</span> &bull; <span>de-</span> &bull; <span>trans-</span>
                            </div>
                            
                            <div class="space-y-4">
                                <div class="q-item flex flex-col sm:flex-row sm:items-center justify-between border-b border-gray-50 pb-3" id="container-s1_q9">
                                    <span class="font-medium text-gray-800 flex-1"><strong class="text-blue-600 mr-2">9</strong> from one thing / place to another <br><span class="text-xs font-normal text-gray-500 italic mt-1 block">(transfer, transform, transcribe)</span></span>
                                    <input type="text" name="s1_q9" class="fill-in-blank mt-2 sm:mt-0" autocomplete="off">

                                    <span class="font-medium text-gray-800 flex-1"><strong class="text-blue-600 mr-2">10</strong> future <br><span class="text-xs font-normal text-gray-500 italic mt-1 block">(foresee, forethought, forecast)</span></span>
                                    <input type="text" name="s1_q10" class="fill-in-blank mt-2 sm:mt-0" autocomplete="off">

                                    <span class="font-medium text-gray-800 flex-1"><strong class="text-blue-600 mr-2">11</strong> make the opposite of <br><span class="text-xs font-normal text-gray-500 italic mt-1 block">(deodorant, defrost, demystify)</span></span>
                                    <input type="text" name="s1_q11" class="fill-in-blank mt-2 sm:mt-0" autocomplete="off">
                                </div>

                                    <span class="font-medium text-gray-800 flex-1"><strong class="text-blue-600 mr-2">12</strong> too much <br><span class="text-xs font-normal text-gray-500 italic mt-1 block">(overweight, overpaid, overestimate)</span></span>
                                    <input type="text" name="s1_q12" class="fill-in-blank mt-2 sm:mt-0" autocomplete="off">
                                </div>
                                <div class="q-item flex flex-col sm:flex-row sm:items-center justify-between border-b border-gray-50 pb-3" id="container-s1_q13">
                                    <span class="font-medium text-gray-800 flex-1"><strong class="text-blue-600 mr-2">13</strong> under / less than <br><span class="text-xs font-normal text-gray-500 italic mt-1 block">(substandard, sub-zero, submarine)</span></span>
                                    <input type="text" name="s1_q13" class="fill-in-blank mt-2 sm:mt-0" autocomplete="off">
                                </div>
                                <div class="q-item flex flex-col sm:flex-row sm:items-center justify-between pb-3" id="container-s1_q14">
                                    <span class="font-medium text-gray-800 flex-1"><strong class="text-blue-600 mr-2">14</strong> wrongly / incorrectly <br><span class="text-xs font-normal text-gray-500 italic mt-1 block">(misuse, misunderstand, mispronounce)</span></span>
                                    <input type="text" name="s1_q14" class="fill-in-blank mt-2 sm:mt-0" autocomplete="off">
                                </div>
                            </div>
                        </div>
                    `
                }
            ]
        }
    };

    // --- APPLICATION LOGIC ---
    document.addEventListener('DOMContentLoaded', () => {
        const app = {
            // State
            userAnswers: {},
            currentSection: 0,
            currentFontSize: 17,

            // Elements
            leftPane: document.getElementById('left-pane'),
            rightPane: document.getElementById('right-pane'),
            questionsSection: document.getElementById('questions-section'),
            splitter: document.getElementById('splitter'),
            sectionTabsContainer: document.getElementById('section-tabs'),
            passageIndicator: document.getElementById('passage-indicator'),
            highlightTooltip: document.getElementById('highlight-tooltip'),
            vocabModal: document.getElementById('vocab-modal'),
            vocabModalContent: document.getElementById('vocab-modal-content'),
            closeVocabModalBtn: document.getElementById('close-vocab-modal'),
            vocabWordEl: document.getElementById('vocab-word'),
            vocabMeaningEl: document.getElementById('vocab-meaning'),
            vocabPronunciationText: document.getElementById('vocab-pronunciation-text'),
            playAudioBtn: document.getElementById('play-audio-btn'),

            init() {
                this.setupEventListeners();
                this.loadContent();
                this.initSplitter();
                this.initHighlighter();
            },

            setupEventListeners() {
                // Font Size Events
                document.getElementById('increase-font-btn').addEventListener('click', () => this.changeFontSize(1));
                document.getElementById('decrease-font-btn').addEventListener('click', () => this.changeFontSize(-1));

                // Close modal events
                this.closeVocabModalBtn.addEventListener('click', () => this.closeModal());
                this.vocabModal.addEventListener('click', (e) => {
                   if (e.target === this.vocabModal) this.closeModal();
                });

                // Input delegator for saving answers and UI styling
                document.body.addEventListener('input', (e) => this.handleInput(e));
                document.body.addEventListener('change', (e) => this.handleChange(e));
                
                // Vocab Words Event Delegation
                this.leftPane.addEventListener('click', (e) => {
                    if (e.target.classList.contains('vocab-word')) {
                        const wordKey = e.target.dataset.word;
                        this.openVocabModal(wordKey);
                    }
                });
                
                // Real Audio Pronunciation Event
                this.playAudioBtn.addEventListener('click', () => {
                   const word = this.vocabWordEl.textContent;
                   if (!word) return;
                   
                   if ('speechSynthesis' in window) {
                       window.speechSynthesis.cancel();
                   }
                   
                   this.playAudioBtn.classList.remove('text-blue-600', 'bg-blue-50');
                   this.playAudioBtn.classList.add('bg-green-500', 'text-white');
                   
                   if ('speechSynthesis' in window) {
                       const utterance = new SpeechSynthesisUtterance(word);
                       utterance.lang = 'en-GB'; 
                       utterance.rate = 0.9; 
                       
                       utterance.onend = () => {
                           this.playAudioBtn.classList.add('text-blue-600', 'bg-blue-50');
                           this.playAudioBtn.classList.remove('bg-green-500', 'text-white');
                       };
                       
                       utterance.onerror = () => {
                           this.playAudioBtn.classList.add('text-blue-600', 'bg-blue-50');
                           this.playAudioBtn.classList.remove('bg-green-500', 'text-white');
                       };
                       
                       window.speechSynthesis.speak(utterance);
                   } else {
                       alert("Sorry, your browser doesn't support text-to-speech audio.");
                       setTimeout(() => {
                           this.playAudioBtn.classList.add('text-blue-600', 'bg-blue-50');
                           this.playAudioBtn.classList.remove('bg-green-500', 'text-white');
                       }, 500);
                   }
                });
            },
            
            changeFontSize(delta) {
                this.currentFontSize += delta;
                if (this.currentFontSize < 14) this.currentFontSize = 14;
                if (this.currentFontSize > 26) this.currentFontSize = 26;
                document.documentElement.style.setProperty('--app-font-size', `${this.currentFontSize}px`);
            },

            openVocabModal(wordKey) {
                const data = vocabulary[wordKey];
                if (data) {
                    this.vocabWordEl.textContent = wordKey;
                    this.vocabMeaningEl.textContent = data.meaning;
                    this.vocabPronunciationText.textContent = data.phonetic || '';
                    this.vocabModal.classList.remove('hidden');
                    setTimeout(() => {
                        this.vocabModalContent.classList.remove('scale-95', 'opacity-0');
                        this.vocabModalContent.classList.add('scale-100', 'opacity-100');
                    }, 10);
                }
            },

            closeModal() {
                if ('speechSynthesis' in window) {
                   window.speechSynthesis.cancel();
                }
                this.vocabModalContent.classList.remove('scale-100', 'opacity-100');
                this.vocabModalContent.classList.add('scale-95', 'opacity-0');
                this.playAudioBtn.classList.add('text-blue-600', 'bg-blue-50');
                this.playAudioBtn.classList.remove('bg-green-500', 'text-white');
                
                setTimeout(() => {
                    this.vocabModal.classList.add('hidden');
                }, 200);
            },
            
            handleInput(e) {
                if (e.target.name && e.target.type === 'text') {
                    this.userAnswers[e.target.name] = e.target.value;
                }
            },

            handleChange(e) {
                if (e.target.name && e.target.type === 'radio') {
                    if (e.target.checked) {
                        this.userAnswers[e.target.name] = e.target.value;
                        
                        if (e.target.classList.contains('hidden')) {
                            const groupRadios = document.querySelectorAll(`input[name="${e.target.name}"]`);
                            groupRadios.forEach(radio => {
                                const label = radio.closest('label');
                                if (radio.checked) {
                                    label.classList.add('bg-blue-50', 'border-blue-400', 'text-blue-800');
                                    label.classList.remove('bg-white', 'border-gray-200');
                                } else {
                                    label.classList.remove('bg-blue-50', 'border-blue-400', 'text-blue-800');
                                    label.classList.add('bg-white', 'border-gray-200');
                                }
                            });
                        }
                    }
                }
            },

            restoreAnswers() {
                for (const qId in this.userAnswers) {
                    const value = this.userAnswers[qId];
                    const inputs = document.querySelectorAll(`input[name="${qId}"]`);
                    
                    inputs.forEach(input => {
                        if (input.type === 'text') {
                            input.value = value;
                        } else if (input.type === 'radio' && input.value === value) {
                            input.checked = true;
                            if (input.classList.contains('hidden')) {
                                const label = input.closest('label');
                                label.classList.add('bg-blue-50', 'border-blue-400', 'text-blue-800');
                            }
                        }
                    });
                }
            },

            loadContent() {
                const data = testData.reading;
                const sectionData = data.sections[this.currentSection];

                // Load left and right panes
                this.leftPane.innerHTML = `<div class="reading-passage">${sectionData.passage}</div>`;
                this.questionsSection.innerHTML = sectionData.questions;

                // Load Navigation Tabs
                this.sectionTabsContainer.innerHTML = data.sections.map((sec, index) =>
                    `<button class="px-4 py-1.5 ${index === this.currentSection ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'} rounded-md text-sm font-semibold shadow-sm transition-colors section-tab-btn" data-section="${index}">Passage ${index + 1}</button>`
                ).join('');

                // Assign Tab Switching Events
                this.sectionTabsContainer.querySelectorAll('.section-tab-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.currentSection = parseInt(e.target.dataset.section);
                        // Reset scroll
                        this.leftPane.scrollTop = 0;
                        this.rightPane.scrollTop = 0;
                        this.loadContent();
                    });
                });
                
                // Update text indicator
                this.passageIndicator.textContent = `Passage ${this.currentSection + 1} of ${data.sections.length}`;

                // Restore previously answered questions visually
                this.restoreAnswers();
            },

            initSplitter() {
                let isDragging = false;
                const contentPanes = document.getElementById('content-panes');

                this.splitter.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    isDragging = true;
                    document.body.style.cursor = 'col-resize';
                });

                document.addEventListener('mousemove', (e) => {
                    if (!isDragging) return;
                    e.preventDefault();
                    if (window.innerWidth <= 768) return; 
                    
                    const containerRect = contentPanes.getBoundingClientRect();
                    const newLeftWidth = e.clientX - containerRect.left;
                    if (newLeftWidth > 200 && newLeftWidth < containerRect.width - 200) {
                        const newLeftPercent = (newLeftWidth / containerRect.width) * 100;
                        contentPanes.style.gridTemplateColumns = `${newLeftPercent}% 5px 1fr`;
                    }
                });

                document.addEventListener('mouseup', () => {
                    if (isDragging) {
                        isDragging = false;
                        document.body.style.cursor = 'default';
                    }
                });
            },

            initHighlighter() {
                document.body.addEventListener('mouseup', (e) => {
                    const selection = window.getSelection();
                    const selectedText = selection.toString().trim();

                    if (selectedText.length > 0) {
                        const range = selection.getRangeAt(0);
                        if (!this.leftPane.contains(range.commonAncestorContainer) && !this.rightPane.contains(range.commonAncestorContainer)) {
                           this.highlightTooltip.style.display = 'none';
                           return;
                        }

                        this.highlightTooltip.style.left = `${e.pageX - 30}px`;
                        this.highlightTooltip.style.top = `${e.pageY - 40}px`;
                        this.highlightTooltip.style.display = 'block';

                        this.highlightTooltip.onclick = () => {
                            const container = range.commonAncestorContainer;
                            if (container.nodeType === 3) { 
                                if (range.startContainer.parentElement !== range.endContainer.parentElement) {
                                    this.highlightTooltip.style.display = 'none';
                                    return;
                                }
                            }
                            
                            const mark = document.createElement('mark');
                            try {
                                range.surroundContents(mark);
                            } catch (ex) {
                            } finally {
                                selection.removeAllRanges();
                                this.highlightTooltip.style.display = 'none';
                            }
                        };
                    } else {
                        this.highlightTooltip.style.display = 'none';
                    }
                });

                document.body.addEventListener('mousedown', (e) => {
                   if (e.target !== this.highlightTooltip && window.getSelection().toString().length === 0) {
                        this.highlightTooltip.style.display = 'none';
                   }
                });
            }
        };

        app.init();
    });
</script>
