        function openTab(event, tabName) {
            const tabcontent = document.getElementsByClassName("tab-content");
            for (let i = 0; i < tabcontent.length; i++) tabcontent[i].style.display = "none";
            const tablinks = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < tablinks.length; i++) tablinks[i].className = tablinks[i].className.replace(" active", "");
            document.getElementById(tabName).style.display = "block";
            event.currentTarget.className += " active";
        }

        function createPart1Cards() {
            const container = document.querySelector('#part1 .grid');
            let html = '';
            part1Topics.forEach(topic => {
                html += `
                    <div class="bg-white p-8 rounded-2xl shadow-sm border-t-8 border-indigo-600 hover:shadow-md transition-shadow duration-300">
                        <h3 class="font-extrabold text-xl text-indigo-900 mb-6">${topic.title}</h3>
                        <ul class="space-y-4 text-slate-700 list-disc list-inside">
                            ${topic.questions.map(q => `<li class="text-base leading-relaxed font-medium">${q}</li>`).join('')}
                        </ul>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

                    html += `

                            <summary class="p-6 font-bold cursor-pointer flex justify-between items-center text-slate-800 hover:bg-indigo-50/50 transition-colors rounded-3xl">
                                <span class="text-lg pr-4 font-bold text-slate-800">${q.part2}</span>
                                <svg class="w-6 h-6 transform group-open:rotate-180 transition-transform duration-300 text-indigo-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
