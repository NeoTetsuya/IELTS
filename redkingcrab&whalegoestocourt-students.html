<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Academic Test Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overscroll-behavior: none;
        }
        .ielts-container {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
        }
        .content-panes {
            display: grid;
            grid-template-columns: 1fr 5px 1fr;
            overflow: hidden;
        }
        .questions-section {
            width: 100%;
        }
        .pane {
            overflow-y: auto;
            padding: 1.5rem;
        }
        .splitter {
            background-color: #d1d5db;
            cursor: col-resize;
            z-index: 10;
        }
        .tab-btn {
            padding: 8px 16px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background-color: #f9fafb;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            background-color: #f3f4f6;
        }
        .tab-btn.active {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        .section-btn {
            padding: 6px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background-color: #f9fafb;
            cursor: pointer;
            transition: all 0.2s;
            margin: 0 4px;
        }
        .section-btn:hover {
            background-color: #e5e7eb;
        }
        .section-btn.active {
            background-color: #1d4ed8;
            color: white;
            border-color: #1d4ed8;
        }
        .play-audio-btn {
            display: inline-flex;
            align-items: center;
            padding: 10px 20px;
            background-color: #2563eb;
            color: white;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .play-audio-btn:hover {
            background-color: #1d4ed8;
        }
        .play-audio-btn:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
        .highlight-tooltip {
            position: absolute;
            background-color: #1f2937;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 100;
            cursor: pointer;
            display: none;
        }
        mark {
            background-color: #fef08a;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 1px 2px;
        }
        mark:hover {
            background-color: #fde047 !important;
            transform: scale(1.02);
        }
        input[type="text"] {
            border: 1px solid #9ca3af;
            border-radius: 4px;
            padding: 4px 8px;
            width: 150px;
        }
        input[type="text"]:focus {
            outline: 2px solid #3b82f6;
            border-color: #3b82f6;
        }
        .audio-seeker {
            -webkit-appearance: none;
            appearance: none;
            background: #e5e7eb;
            outline: none;
            border-radius: 0.5rem;
        }
        .audio-seeker::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #3b82f6;
            cursor: pointer;
            border-radius: 50%;
        }
        .question-highlight {
            background-color: #fef08a;
            color: #92400e;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            border: 2px solid #f59e0b;
            display: inline-block;
            margin: 0 2px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .question-highlight:hover {
            background-color: #fde047;
            border-color: #d97706;
            transform: scale(1.05);
        }
        .reading-passage {
            line-height: 1.8;
            font-size: 16px;
            color: #374151;
            text-align: justify;
            margin-bottom: 2rem;
            user-select: text;
        }
        .reading-passage p {
            margin-bottom: 1.5rem;
            text-indent: 1.5rem;
        }
        .reading-passage h3, .reading-passage h4 {
            color: #1f2937;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        .vocab-word {
            cursor: help;
            border-bottom: 1px dotted #3b82f6;
            color: #1e40af;
            transition: all 0.2s ease;
        }
        .vocab-word:hover {
            background-color: #dbeafe;
            border-bottom-color: #1e40af;
        }
        .reading-passage.selecting {
            background-color: rgba(59, 130, 246, 0.05);
        }
        .vocab-tooltip {
            position: absolute;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            color: white;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            max-width: 350px;
            font-size: 14px;
            line-height: 1.5;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            pointer-events: auto;
            user-select: none;
        }
        .vocab-tooltip.show {
            opacity: 1;
            transform: translateY(0);
        }
        .vocab-tooltip::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 20px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 8px solid #1e40af;
        }
        .vocab-word-text {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 8px;
            color: #fbbf24;
        }
        .vocab-pronunciation {
            font-style: italic;
            color: #e5e7eb;
            margin-bottom: 4px;
        }
        .vocab-ipa {
            font-family: 'Times New Roman', serif;
            color: #d1d5db;
            margin-bottom: 8px;
        }
        .vocab-definition {
            margin-bottom: 8px;
        }
        .vocab-synonyms {
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 8px;
            margin-top: 8px;
        }
        .vocab-synonyms-title {
            font-weight: bold;
            color: #fbbf24;
            margin-bottom: 4px;
        }
        .vocab-audio-btn {
            background: #fbbf24;
            color: #1e40af;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-left: 8px;
            transition: all 0.2s ease;
            font-size: 14px;
        }
        .vocab-audio-btn:hover {
            background: #f59e0b;
            transform: scale(1.1);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .vocab-audio-btn.playing {
            background: #10b981;
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

<div id="test-container" class="ielts-container">

            </div>
            <div>

                    <span>Submit to Google Form</span>
                </button>
            </div>
        </div>
    </footer>
</div>

<!-- Highlight Tooltip -->
<div id="highlight-tooltip" class="highlight-tooltip">Highlight</div>

<!-- Vocabulary Tooltip -->
<div id="vocab-tooltip" class="vocab-tooltip">

</div>

                        <h4 class="font-bold mb-2 mt-6">Questions 31-40</h4>
                        <p class="mb-4">Complete the notes below. Write <strong>ONE WORD ONLY</strong> for each answer.</p>
                        <div class="space-y-4 p-5 border rounded-lg bg-white shadow-sm">
                            <h5 class="font-bold text-center text-xl text-blue-800 mb-4">The Red King crab</h5>
                            
                            <h6 class="font-semibold text-lg text-gray-800 border-b pb-1 mt-4 mb-2">Introduction</h6>
                            <ul class="list-disc pl-6 space-y-2 text-gray-700">
                                <li>The Red King Crab is migrating into European waters from the far <strong>31</strong> <input type="text" id="q31" data-q="31" class="border-b-2 border-t-0 border-l-0 border-r-0 border-gray-400 focus:border-blue-500 rounded-none bg-transparent"></li>

                            <ul class="list-disc pl-6 space-y-2 text-gray-700">
                                <li>The Red King Crab has a deep red <strong>33</strong> <input type="text" id="q33" data-q="33" class="border-b-2 border-t-0 border-l-0 border-r-0 border-gray-400 focus:border-blue-500 rounded-none bg-transparent"> that develops after several molts.</li>

                        <h3 class="text-2xl font-bold mb-2 text-center text-gray-800">The Whale Goes to Court</h3>
                        <h4 class="text-lg font-semibold mb-6 text-center text-gray-600 italic">A remarkable legal drama in the U.S.A</h4>
                        
                        <p class="mb-4">In 1818, a whale became the subject of a controversial court case in New York City. The case involved an old law requiring those who sold fish oil to pay a fee in order to have their barrels inspected by city officials and certified. However, an oil merchant named Samuel Judd refused to pay the inspection fee on three barrels of oil, claiming that no inspection was necessary because it was whale oil, and whales were not fish. The state disagreed, and so a date was set for a court to decide not a point of law, but the answer to a more fundamental question: Is a whale a fish?</p>
                        
                        <p class="mb-4">As simple as that question may appear today, the answer was far from obvious in the early nineteenth century. Indeed, the public debate in New York sparked off by the trial was sensational. At stake was nothing less than what most regarded as the order of nature. According to the commonly accepted scheme of things, if an animal was not a beast or a bird, it was a fish, regardless of whether it breathed air or suckled its young. For as long as anyone could remember, all non-human creatures had been organized according to the categories of birds, beasts, or fish. For the average person, the answer seemed perfectly obvious: whales swam in the sea and therefore they were fish.</p>
                        
                        <p class="mb-4">Against this traditional framework stood the new Linnaean system of classification, which sought to introduce more scientific values into the classification of living things. Barely half a century old in 1818, the Linnaean system controversially classified whales as mammals because they shared two mammalian characteristics: they were warm-blooded and breathed air.</p>
                        
                        <p class="mb-4">So the trial began in December 1818. Judd's defense lawyers chose as their star witness one of New York's most prominent figures, the congressman Samuel Mitchill. Referred to as a "living encyclopedia" and a "walking library", Mitchill was a renowned natural history lecturer at the College of Physicians and Surgeons who liked to dare his students to test his knowledge of the natural world. "Show me the fin, and I will name the fish," he boasted. Scientifically, it was an open-and-shut case, and Judd's defense lawyers believed they only had to do one simple thing to win the trial: insist that it be decided by biology alone. Mitchill seemed fully qualified for this role.</p>
                        
                        <p class="mb-4">But this is where the case becomes interesting, and is the reason why the trial of the whale is not some dusty nineteenth-century obscurity. For rather than debate Mitchill on his area of expertise, lawyers for the New York City fish-oil inspectors chose a different tack. Lead counsel William Sampson turned the trial into a contest between scientific learning and common sense, by asking plain-spoken whalers to make their case before the jury.</p>
                        
                        <p class="mb-4">The crux of Sampson's case was the trial's implication with regard to humans: should Judd be found not guilty? Sampson told jury members that if they accepted Mitchill's testimony on whales, they were obliged to accept a lower place for their own kind in the natural order. As a result, Mitchill's day in court did not go smoothly, not least because he was forced to acknowledge serious disputes among his peers regarding exactly how to classify biological organisms. Sampson then took aim at Mitchill himself and what he represented: privileged aristocrats from the scientific community who had lost touch with reality. The smooth-talking Sampson then claimed Mitchill's beliefs had their origin in Europe — something he rightly judged would infuriate the citizens of always-independent New York. This revolutionary new thinking, Sampson claimed, was something that honest working New Yorkers could do without. No longer was this a case about barrels of oil; but the proper place of scientific knowledge in the U.S.A. Ultimately, what won the case for Samuel Judd were not Mitchill's scientific arguments, but testimony from a different sphere altogether. In New York's markets, the merchants implicitly understood that whale oil and fish oil were not the same: whale oil could be used as a fuel for lamps because it could be burned without giving off smoke; fish oil, on the other hand, was nasty, impure stuff used primarily in tanning leather. In the end, it was this testimony that led to Judd's victory.</p>
                        
                        <p class="mb-4">The trial of the whale still has relevance today, when the court of public opinion remains easily swayed by skeptics. The 1818 trial was really about this question: who gets to decide on the place of the natural world in the human world — scientific experts or public opinion? Whether the issue today is the effects of human activity on the climate of this planet, or one of many other contemporary topics, the legacy of Judd's case continues to be of relevance.</p>

    // --- APPLICATION LOGIC ---
    document.addEventListener('DOMContentLoaded', () => {
        const app = {
            userAnswers: {},
            currentTab: 'listening',
            currentSection: 0,

            contentPanes: document.getElementById('content-panes'),
            leftPane: document.getElementById('left-pane'),
            rightPane: document.getElementById('right-pane'),
            questionsSection: document.getElementById('questions-section'),
            splitter: document.getElementById('splitter'),
            sectionTabsContainer: document.getElementById('section-tabs'),
            highlightTooltip: document.getElementById('highlight-tooltip'),
            vocabTooltip: document.getElementById('vocab-tooltip'),

            init() {
                this.setupEventListeners();
                this.loadContent();
                this.initSplitter();
                this.initHighlighter();
                this.processVocabulary();
                this.initSpeechSynthesis();
            },

            setupEventListeners() {
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => this.switchTab(e.target.dataset.tab));
                });
                
                // Form interactions
                document.body.addEventListener('input', (e) => this.saveAnswer(e));
                document.body.addEventListener('change', (e) => this.saveAnswer(e));
                
                this.questionsSection.addEventListener('click', (e) => this.handleClicks(e));
                this.leftPane.addEventListener('click', (e) => this.handleClicks(e));
                this.rightPane.addEventListener('click', (e) => {
                    if (e.target.classList.contains('question-highlight')) {
                        this.clearSpecificHighlight(e.target);
                    }
                });

                // Submit Form listener (Delegated to catch the button in the footer)
                document.body.addEventListener('click', (e) => {
                    const submitBtn = e.target.closest('#submit-form-btn');
                    if (submitBtn) {
                        this.submitToGoogleForm();
                    }
                });

                let tooltipTimeout;
                let showTimeout;
                let isTooltipHovered = false;
                let isSelecting = false;

                document.addEventListener('mouseover', (e) => {
                    if (e.target.classList.contains('vocab-word')) {
                        clearTimeout(tooltipTimeout);
                        clearTimeout(showTimeout);
                        showTimeout = setTimeout(() => {
                            if (!isSelecting) {
                                const word = e.target.dataset.word;
                                this.showVocabularyTooltip(word, e.target);
                            }
                        }, 500);
                    }
                });

                document.addEventListener('mouseout', (e) => {
                    if (e.target.classList.contains('vocab-word')) {
                        clearTimeout(showTimeout);
                        tooltipTimeout = setTimeout(() => {
                            if (!isTooltipHovered) {
                                this.hideVocabularyTooltip();
                            }
                        }, 300);
                    }
                });

                document.addEventListener('mousedown', (e) => {
                    if (e.target.classList.contains('vocab-word') || e.target.closest('.reading-passage')) {
                        isSelecting = true;
                        this.hideVocabularyTooltip();
                        const passage = e.target.closest('.reading-passage');
                        if (passage) passage.classList.add('selecting');
                    }
                });

                document.addEventListener('mouseup', (e) => {
                    setTimeout(() => {
                        isSelecting = false;
                        const passage = e.target.closest('.reading-passage');
                        if (passage) passage.classList.remove('selecting');
                    }, 100);
                });

                this.vocabTooltip.addEventListener('mouseenter', () => {
                    clearTimeout(tooltipTimeout);
                    isTooltipHovered = true;
                });

                this.vocabTooltip.addEventListener('mouseleave', () => {
                    isTooltipHovered = false;
                    this.hideVocabularyTooltip();
                });
            },

            handleClicks(e) {
                if (e.target.classList.contains('question-highlight')) {
                    this.clearSpecificHighlight(e.target);
                } else if (e.target.tagName === 'MARK') {
                    this.clearMarkHighlight(e.target);
                }
            },

            saveAnswer(e) {
                if (e.target.id || e.target.name) {
                    const id = e.target.id || e.target.name;
                    if (e.target.type === 'checkbox') {
                        const checkboxes = document.querySelectorAll(`input[name="${id}"]:checked`);
                        const values = Array.from(checkboxes).map(cb => cb.value);
                        this.userAnswers[id] = values.join('/');
                    } else if (e.target.type === 'radio') {
                        if (e.target.checked) this.userAnswers[id] = e.target.value;
                    } else {
                        this.userAnswers[id] = e.target.value;
                    }
                }
            },

            restoreAnswers() {
                for (const qId in this.userAnswers) {
                    const value = this.userAnswers[qId];
                    const textInput = document.getElementById(qId);
                    const radioInputs = document.querySelectorAll(`input[name="${qId}"]`);

                    if (textInput) {
                        textInput.value = value;
                    } else if (radioInputs.length > 0) {
                        if (value.includes('/')) {
                            const values = value.split('/');
                            radioInputs.forEach(input => {
                                input.checked = values.includes(input.value);
                            });
                        } else {
                            radioInputs.forEach(radio => {
                                radio.checked = radio.value === value;
                            });
                        }
                    }
                }
            },

            switchTab(tabName) {
                this.currentTab = tabName;
                this.currentSection = 0;
                
                if (tabName === 'vocabulary') {
                    this.questionsSection.style.display = 'none';
                } else {
                    this.questionsSection.style.display = 'block';
                }
                
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.tab === tabName);
                });
                this.loadContent();
            },
            
            switchSection(sectionIndex) {
                 this.currentSection = sectionIndex;
                 this.loadContent();
            },

            clearSpecificHighlight(element) {
                if (element.classList.contains('question-highlight')) {
                    element.classList.remove('question-highlight');
                    element.style.cssText = '';
                }
            },

            clearMarkHighlight(element) {
                const parent = element.parentNode;
                const text = element.textContent;
                parent.replaceChild(document.createTextNode(text), element);
                parent.normalize();
            },

            processVocabulary() {
                const readingPassages = document.querySelectorAll('.reading-passage');
                readingPassages.forEach(passage => {
                    this.addVocabularyTooltips(passage);
                });
            },

            addVocabularyTooltips(container) {
                const walker = document.createTreeWalker(
                    container,
                    NodeFilter.SHOW_TEXT,
                    null,
                    false
                );

                const textNodes = [];
                let node;
                while (node = walker.nextNode()) textNodes.push(node);

                textNodes.forEach(textNode => {
                    const text = textNode.textContent;
                    const words = text.split(/(\s+)/);
                    let changed = false;
                    const newContent = words.map(word => {
                        const cleanWord = word.toLowerCase().replace(/[^\w]/g, '');
                        if (vocabularyDatabase[cleanWord]) {
                            changed = true;
                            return `<span class="vocab-word" data-word="${cleanWord}">${word}</span>`;
                        }
                        return word;
                    }).join('');

                    if (changed) {
                        const wrapper = document.createElement('span');
                        wrapper.innerHTML = newContent;
                        textNode.parentNode.replaceChild(wrapper, textNode);
                    }
                });
            },

            showVocabularyTooltip(word, element) {
                const vocabData = vocabularyDatabase[word];
                if (!vocabData) return;

                const tooltip = this.vocabTooltip;
                tooltip.querySelector('.vocab-word-display').textContent = word;
                tooltip.querySelector('.vocab-pronunciation').textContent = vocabData.pronunciation;
                tooltip.querySelector('.vocab-ipa').textContent = vocabData.ipa;
                tooltip.querySelector('.vocab-definition').textContent = vocabData.definition;
                tooltip.querySelector('.vocab-synonyms-list').textContent = vocabData.synonyms.join(', ');

                const audioBtn = tooltip.querySelector('.vocab-audio-btn');
                audioBtn.onclick = () => this.playWordPronunciation(word);
                audioBtn.classList.remove('playing');

                const rect = element.getBoundingClientRect();
                const tooltipRect = tooltip.getBoundingClientRect();
                
                let left, top;
                if (window.innerWidth - rect.right >= tooltipRect.width + 20) {
                    left = rect.right + 15;
                    top = rect.top + (rect.height / 2) - (tooltipRect.height / 2);
                    tooltip.style.transform = 'translateY(0)';
                } else if (rect.left >= tooltipRect.width + 20) {
                    left = rect.left - tooltipRect.width - 15;
                    top = rect.top + (rect.height / 2) - (tooltipRect.height / 2);
                    tooltip.style.transform = 'translateY(0)';
                } else if (rect.top >= tooltipRect.height + 20) {
                    left = rect.left + (rect.width / 2) - (tooltipRect.width / 2);
                    top = rect.top - tooltipRect.height - 15;
                    tooltip.style.transform = 'translateY(-10px)';
                } else {
                    left = rect.left + (rect.width / 2) - (tooltipRect.width / 2);
                    top = rect.bottom + 15;
                    tooltip.style.transform = 'translateY(10px)';
                }

                left = Math.max(10, Math.min(left, window.innerWidth - tooltipRect.width - 10));
                top = Math.max(10, Math.min(top, window.innerHeight - tooltipRect.height - 10));

                tooltip.style.left = left + 'px';
                tooltip.style.top = top + 'px';
                tooltip.classList.add('show');
            },

            hideVocabularyTooltip() {
                this.vocabTooltip.classList.remove('show');
            },

            initSpeechSynthesis() {
                if ('speechSynthesis' in window) {
                    speechSynthesis.addEventListener('voiceschanged', () => {});
                }
            },

            playWordPronunciation(word) {
                if (!('speechSynthesis' in window)) return;

                const audioBtn = this.vocabTooltip.querySelector('.vocab-audio-btn');
                speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(word);
                utterance.rate = 0.8;
                utterance.lang = 'en-US';

                utterance.onstart = () => {
                    audioBtn.classList.add('playing');
                    audioBtn.textContent = '⏸️';
                };
                utterance.onend = utterance.onerror = () => {
                    audioBtn.classList.remove('playing');
                    audioBtn.textContent = '🔊';
                };

                speechSynthesis.speak(utterance);
            },

            loadContent() {
                if (this.currentTab === 'vocabulary') {
                    this.loadVocabularyQuiz();
                    return;
                }
                
                const data = testData[this.currentTab];
                const sectionData = data.sections[this.currentSection];

                this.contentPanes.style.gridTemplateColumns = '1fr 5px 1fr';
                this.leftPane.style.display = 'block';
                this.splitter.style.display = 'block';

                if (this.currentTab === 'listening') {
                    this.leftPane.innerHTML = `<div class="space-y-6">${sectionData.instructions}${sectionData.questions}</div>`;
                    this.questionsSection.innerHTML = ''; 
                } else {
                    this.leftPane.innerHTML = `<div class="reading-passage p-4">${sectionData.passage}</div>`;
                    this.questionsSection.innerHTML = `<div class="p-4">${sectionData.questions}</div>`;
                }

                this.sectionTabsContainer.innerHTML = data.sections.map((sec, index) =>
                    `<button class="section-btn ${index === this.currentSection ? 'active' : ''}" data-section-index="${index}">${sec.title}</button>`
                ).join('');
                
                this.sectionTabsContainer.querySelectorAll('.section-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => this.switchSection(parseInt(e.target.dataset.sectionIndex)));
                });

                this.restoreAnswers();
                
                if (this.currentTab === 'reading') setTimeout(() => this.processVocabulary(), 100);
            },

            loadVocabularyQuiz() {
                this.contentPanes.style.gridTemplateColumns = '1fr';
                this.leftPane.style.display = 'block';
                this.splitter.style.display = 'none';
                this.questionsSection.style.display = 'none';
                this.sectionTabsContainer.innerHTML = '';
                
                this.currentQuizQuestion = 0;
                this.quizScore = 0;
                
                let html = `
                    <div class="max-w-4xl mx-auto p-6">
                        <div class="text-center mb-8">
                            <h2 class="text-3xl font-bold text-blue-600 mb-4">${vocabularyQuiz.title}</h2>
                            <p class="text-lg text-gray-600 mb-6">${vocabularyQuiz.description}</p>
                        </div>
                        <div id="question-container" class="min-h-96"></div>
                        <div id="vocab-results" class="mt-8 hidden bg-gray-50 border border-gray-200 rounded-lg p-6 text-center">
                            <h3 class="text-xl font-bold text-gray-800 mb-4">Quiz Results</h3>
                            <div id="vocab-score" class="text-2xl font-bold text-blue-600 mb-4"></div>
                            <div id="vocab-feedback" class="text-gray-700 mb-4"></div>
                            <button id="restart-quiz" class="bg-blue-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-blue-700 transition-colors">Take Quiz Again</button>
                        </div>
                    </div>
                `;
                
                this.leftPane.innerHTML = html;
                document.getElementById('restart-quiz').addEventListener('click', () => this.loadVocabularyQuiz());
                this.showCurrentQuestion();
            },

            showCurrentQuestion() {
                const question = vocabularyQuiz.questions[this.currentQuizQuestion];
                let html = `
                    <div class="bg-white border border-gray-200 rounded-lg p-8 shadow-lg">
                        <h4 class="text-xl font-semibold text-gray-800 mb-6">${this.currentQuizQuestion + 1}. ${question.question}</h4>
                `;
                
                if (question.type === 'multiple_choice' || question.type === 'gap_filling') {
                    const options = question.options || question.suggestions;
                    html += '<div class="space-y-3">';
                    options.forEach((opt, idx) => {
                        const val = question.type === 'gap_filling' ? opt : idx;
                        html += `
                            <label class="flex items-center space-x-3 p-4 border border-gray-200 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors">
                                <input type="radio" name="${question.id}" value="${val}">
                                <span class="text-gray-700 text-lg">${opt}</span>
                            </label>
                        `;
                    });
                    html += '</div>';
                } else if (question.type === 'true_false') {
                    html += `
                        <div class="space-y-3">
                            <label class="flex items-center space-x-3 p-4 border border-gray-200 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors">
                                <input type="radio" name="${question.id}" value="true"> <span class="text-gray-700 text-lg">True</span>
                            </label>
                            <label class="flex items-center space-x-3 p-4 border border-gray-200 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors">
                                <input type="radio" name="${question.id}" value="false"> <span class="text-gray-700 text-lg">False</span>
                            </label>
                        </div>
                    `;
                }
                
                html += `
                        <div id="explanation-${question.id}" class="mt-6 p-4 bg-gray-50 border border-gray-200 rounded-lg hidden">
                            <h5 class="font-semibold text-gray-800 mb-2">Explanation:</h5>
                            <p class="text-gray-700">${question.explanation}</p>
                        </div>
                    </div>
                `;
                
                document.getElementById('question-container').innerHTML = html;
                
                document.querySelectorAll(`input[name="${question.id}"]`).forEach(input => {
                    input.addEventListener('change', () => {
                        let isCorrect = false;
                        if(question.type === 'multiple_choice') isCorrect = parseInt(input.value) === question.correct;
                        else if(question.type === 'true_false') isCorrect = (input.value === 'true') === question.correct;
                        else isCorrect = input.value === question.correct;

                        if (isCorrect) this.quizScore++;
                        
                        document.getElementById(`explanation-${question.id}`).classList.remove('hidden');
                        document.querySelectorAll(`input[name="${question.id}"]`).forEach(i => i.disabled = true);
                        
                        const label = input.closest('label');
                        if (isCorrect) {
                            label.classList.add('border-green-500', 'bg-green-50');
                        } else {
                            label.classList.add('border-red-500', 'bg-red-50');
                        }

                        setTimeout(() => {
                            this.currentQuizQuestion++;
                            if (this.currentQuizQuestion >= vocabularyQuiz.questions.length) {
                                document.getElementById('question-container').innerHTML = '';
                                document.getElementById('vocab-results').classList.remove('hidden');
                                document.getElementById('vocab-score').textContent = `Score: ${this.quizScore}/${vocabularyQuiz.questions.length}`;
                            } else {
                                this.showCurrentQuestion();
                            }
                        }, 2000);
                    });
                });
            },

            submitToGoogleForm() {
                const nameInput = document.getElementById('student-name');
                const name = nameInput ? nameInput.value : '';

                const params = new URLSearchParams();
                params.append('usp', 'pp_url');
                
                // Append the student's name
                if (name) params.append('entry.46708143', name);

                // Map form input IDs to Google Forms entry parameters
                const textEntries = {
                    'q31': 'entry.1540937544',
                    'q32': 'entry.728640017',
                    'q33': 'entry.2050944953',
                    'q34': 'entry.435654003',
                    'q35': 'entry.663799233',
                    'q36': 'entry.1931778275',
                    'q37': 'entry.1866969193',
                    'q38': 'entry.594013301',
                    'q39': 'entry.1841756840',
                    'q40': 'entry.1871028695',
                    'q1': 'entry.1868110156',
                    'q2': 'entry.1480125415',
                    'q3': 'entry.1012201402',
                    'q4': 'entry.817674773',
                    'q5': 'entry.1638647808',
                    'q6': 'entry.1018855086',
                    'q7': 'entry.2033597587',
                    'q8': 'entry.1651172622',
                    'q9': 'entry.1577359016',
                    'q10': 'entry.1745467822',
                    'q11': 'entry.1338565567',
                    'q12': 'entry.356873444',
                    'q13': 'entry.1898221980'
                };

                for (const [qId, entryId] of Object.entries(textEntries)) {
                    if (this.userAnswers[qId]) {
                        // Uppercase the answer specifically as required by the form
                        params.append(entryId, this.userAnswers[qId].toUpperCase().trim());
                    }
                }

                // The target Google Form link
                const formId = '1FAIpQLSfwVb1Z7gcdHsZz_xP5n2iUL5uPKwQjHvMFlJOqiC2FM2b5tw';
                const url = `https://docs.google.com/forms/d/e/${formId}/viewform?${params.toString()}`;
                
                window.open(url, '_blank');
            },

            initSplitter() {
                let isDragging = false;
                this.splitter.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    isDragging = true;
                });
                document.addEventListener('mousemove', (e) => {
                    if (!isDragging) return;
                    const containerRect = this.contentPanes.getBoundingClientRect();
                    const newLeftWidth = e.clientX - containerRect.left;
                    if (newLeftWidth > 100 && newLeftWidth < containerRect.width - 100) {
                        const newLeftPercent = (newLeftWidth / containerRect.width) * 100;
                        this.contentPanes.style.gridTemplateColumns = `${newLeftPercent}% 5px 1fr`;
                    }
                });
                document.addEventListener('mouseup', () => isDragging = false);
            },
            
            initHighlighter() {
                document.body.addEventListener('mouseup', (e) => {
                    const selection = window.getSelection();
                    const selectedText = selection.toString().trim();
                    if (selectedText.length > 0) {
                        const range = selection.getRangeAt(0);
                        if (!this.leftPane.contains(range.commonAncestorContainer) && !this.rightPane.contains(range.commonAncestorContainer)) {
                           this.highlightTooltip.style.display = 'none';
                           return;
                        }
                        this.highlightTooltip.style.left = `${e.pageX}px`;
                        this.highlightTooltip.style.top = `${e.pageY - 30}px`;
                        this.highlightTooltip.style.display = 'block';

                        this.highlightTooltip.onclick = () => {
                            try {
                                const mark = document.createElement('mark');
                                range.surroundContents(mark);
                            } catch (ex) {}
                            selection.removeAllRanges();
                            this.highlightTooltip.style.display = 'none';
                        };
                    } else {
                        this.highlightTooltip.style.display = 'none';
                    }
                });

                document.body.addEventListener('mousedown', (e) => {
                   if (e.target !== this.highlightTooltip && window.getSelection().toString().length === 0) {
                        this.highlightTooltip.style.display = 'none';
                   }
                });
            }
        };

        app.init();
    });
</script>
