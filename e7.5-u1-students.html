        body {

        }
        .ielts-container {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
        }
        .content-panes {
            display: grid;
            grid-template-columns: 1fr 5px 1fr;
            overflow: hidden;
        }
        .pane {
            overflow-y: auto;
            padding: 2rem 3rem;
            font-size: var(--app-font-size);
            scroll-behavior: smooth;
        }
        #left-pane {
            background-color: #fdfdfd;
        }
        #right-pane {
            background-color: #f8fafc;
        }
        .splitter {
            background-color: #cbd5e1;
            cursor: col-resize;
            z-index: 10;
            transition: background-color 0.2s;
        }
        .splitter:hover, .splitter:active {
            background-color: #94a3b8;
        }
        
        /* Typography Improvements */
        .reading-passage {
            font-family: 'Merriweather', serif;
            line-height: 1.9;
            color: #334155;
            text-align: left;
            margin-bottom: 2rem;
            max-width: 800px;
            margin: 0 auto;

        .reading-passage p {
            margin-bottom: 1.5rem;
            text-indent: 1.5rem;
        }
        .reading-passage h3 {
            font-family: 'Inter', sans-serif;
            color: #0f172a;
            margin-bottom: 1.5rem;
            font-weight: 700;
            font-size: 1.5em;
            text-align: center;
        }

        /* Question Styles */
        .q-item {
            padding: 1rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }
        
        /* Input Styles for Fill-in-the-blanks */
        .fill-in-blank {
            border: none;
            border-bottom: 2px dashed #94a3b8;
            background-color: #f8fafc;
            padding: 2px 8px;
            font-weight: 600;
            color: #0f172a;
            width: 180px;
            transition: all 0.2s;
            text-align: center;
            border-radius: 4px 4px 0 0;
            margin: 0 4px;
        }
        .fill-in-blank:focus {
            outline: none;
            border-bottom: 2px solid #2563eb;
            background-color: #eff6ff;
        }

        /* Vocabulary Styles */
        .vocab-word {
            color: #2563eb;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px dotted #93c5fd;
            transition: all 0.2s ease-in-out;
            padding: 0 2px;
        }
        .vocab-word:hover {
            background-color: #dbeafe;
            border-bottom-style: solid;
            border-radius: 2px;
        }

        /* Tables */
        .ielts-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .ielts-table th, .ielts-table td {
            border: 1px solid #e2e8f0;
            padding: 1rem;
            text-align: left;
            vertical-align: top;
        }

            background-color: #f1f5f9;
            font-weight: 600;
            color: #475569;
        }

                        <h3>Inside the brain of the monarch butterfly</h3>
                        <p>The annual migration of monarch butterflies is considered to be one of the most remarkable natural <span class="vocab-word" data-word="phenomena">phenomena</span> on the planet. The insects are typically found in the eastern US and south-eastern Canada, where they spend the summer months before flying south to a single spot in central Mexico (on top of the Michoacan Mountains) for the winter. The journey can involve travelling up to 3,000 miles. At these wintering sites they cluster on top of trees in their millions, and the air is full of the sound of their wings. Their reliance on this single spot to spend the winter has led to the monarch butterfly being rated as one of the most <span class="vocab-word" data-word="endangered">endangered</span> creatures in the world.</p>
                        
                        <p>Monarch butterflies migrate for two reasons. Firstly, they cannot <span class="vocab-word" data-word="withstand">withstand</span> the freezing temperatures in northern and central climates. Secondly, the milkweed plants, which are the food that their larvae prefer, do not grow in their overwintering sites, so the spring generation must fly back northwards to lay their eggs in places where the plants are plentiful.</p>
                        
                        <p>This ability to continue travelling in the same direction to the same spot year after year has been the subject of scientific interest for decades. The butterflies have a relatively short lifespan: individuals live between two and eight months. Some butterflies make the whole trip, but others lay eggs and die on the way, leaving <span class="vocab-word" data-word="offspring">offspring</span> to complete the journey. It follows from this that the butterflies do not learn their route; instead their <span class="vocab-word" data-word="navigational">navigational</span> abilities appear to be part of a genetic programme that enables them to make the journey. Their migration is repeated instinctively by generations, and has continued even as monarch numbers have <span class="vocab-word" data-word="plummeted">plummeted</span> due to loss of their main food source.</p>
                        
                        <p>Now at last, scientists believe they have cracked the secret of how the monarch butterfly's brain works to establish the direction of flight during migration. It is hoped this discovery will help scientists understand how they navigate and locate their food. Dr Eli Shlizerman, lead author of the study, joined with colleagues at the University of Michigan and the University of Massachusetts to show how the monarch's internal compass works. Dr Shlizerman, who is an assistant professor at the University of Washington in the US, said: "Their brain, which contains a compass, integrates two pieces of information — the time of day and the sun's position on the horizon — to find the southerly direction. We wanted to understand how the monarch is processing these different types of information to yield this constant behaviour — flying south-west each autumn."</p>
                        
                        <p>Monarchs use their large, complex eyes to monitor where the sun is in the sky, but this information alone is not enough to determine direction. Each butterfly must combine that information with the time of day to know where to go. Like most animals, including humans, monarchs possess an internal clock based on the rhythmic expression of key genes. This clock maintains a daily pattern of physiology and behaviour and in the monarch butterfly, it is centred in the antennae.</p>
                        
                        <p>Dr Shlizerman added: "We created a computer model that incorporated this information — how the antennae and eyes send this information to the brain. Our goal was to model what type of control mechanism would be at work within the brain, and then asked whether our model could guarantee sustained navigation in the south-westerly direction."</p>

                        <p>Their model also shows that when they make a mistake, monarchs do not simply make the shortest turn to get back on route. The model includes a unique feature — a 'separation point' that controls whether the monarch turns right or left to make a course correction. Dr Shlizerman explained: "The location of this point in the monarch butterfly's visual field changes throughout the day, and our model predicts that the monarch will not cross this point when it makes a course correction. In experiments with living monarchs at different times of the day, it is evident that there are occasions where their turns in course corrections are unusually long, slow, or meandering. These could be cases where they can't do a shorter turn, because that would require crossing the separation point. And when that happens, their compass points north-east instead of south-west. It's a simple, <span class="vocab-word" data-word="robust">robust</span> system to explain how these butterflies — generation after generation — make this remarkable migration."</p>

                        <h3>Using neuroscience to manage your time</h3>
                        <p>In the face of pressure, our instinct is to study or work as much as we can for as long as we can. So why do we still feel as if we have not <span class="vocab-word" data-word="accomplished">accomplished</span> enough at the end of the day?</p>
                        
                        <p>Neuroscientist and professor at the Manhattan NeuroLeadership Institute, Josh Davis, suggests that, rather than focusing on what is urgent, people should decide what matters most and pinpoint the best time to do it. "It's really about being highly effective as far as it's reasonable for a human being," Davis says. He believes that, rather than making a to-do list and working through each item, people should decide on the main aim for the day and work out when they are most likely to achieve peak productivity. Then this time can be devoted to the task with the highest priority, such as writing an essay or revising.</p>
                        
                        <p>It is obviously impossible to work intensively all the time, so simple tasks not requiring much attention — emails or paperwork — can be done in any 'downtime'. However, there are times when the extent to which small tasks can tax our brains is underestimated. Sending an email, for example, may appear simple on the surface but can involve a decision which, although trivial, can cause mental exhaustion. In this case, it is better to reorder the day and deal with less pressing concerns only after the work target has been achieved.</p>
                        
                        <p>The time of day when people are most alert varies from person to person but as a general rule the first two hours after waking up are not <span class="vocab-word" data-word="conducive">conducive</span> to serious study. Research measuring attention, verbal reasoning and reaction times has also shown that when our body temperature falls below 37 degrees C, the brain is not at its full potential so the worst time to do anything involving thinking is between midnight and 6am. This is almost as bad as the afternoon <span class="vocab-word" data-word="slump">slump</span> between 2pm and 4pm, which is more to do with feeling cold than a heavy lunch.</p>
                        
                        <p>Rather than being afraid of getting distracted, just be careful how you do it "These days, when people decide to take a break, they tend to go on social media", says Davis, "and then they spend too much time there." Instead, they should go back to day-dreaming, where it is possible to stop thinking about work without really focusing on anything else. This allows for creative thinking and the integration between different parts of the brain, which cannot occur when the mind is required to focus on something specific.</p>
                        
                        <p>Neuroscience has revealed much about the mind-body connection and how exercise can be used as a tool. "It's a different way of seeing exercise," says Davis "Usually we think about how in the long term it will make us healthy and look better but this is focused on the short term." A short session — 20 minutes or so — of moderate exercise will be sufficient. It does not need to be a lengthy gym visit; just running up and down stairs or jogging on the spot can be an effective method of lessening tension and boosting positive emotions.</p>

                        <p>Food that keeps blood-sugar levels stable will also help people to work most effectively, says Davis. If people snack during the day, they should choose foods that contain fats such as nuts and cheese rather than carbohydrates, to avoid blood-sugar spikes. Starting the day with high-protein food such as eggs and toast will have a high impact on the neurotransmitters in the brain. The amino acid tyrosine, which is found in proteins, will stimulate the transmitters responsible for alertness and the calming protein tryptophan will relax the brain. On meal breaks, people should eat only to 80 percent capacity; people's best work will be done when they are slightly hungry but not starving. Keep hydrated and improve your mood by sipping water. Just remember not to overdo caffeine; it may improve your alertness but also minimizes concentration.</p>

                        <p>Ensure you have a well-lit study space and that your desk space is clear; clutter is a distraction and not a good one, as it reminds you of uncompleted work A clear desk also gives you room for increased movement, whether sitting with your arms behind your head or your feet up. You could alternate between standing and sitting.</p>

                        <p>Finally, try to get eight hours sleep a night. While we sleep, our brains process and retain information, <span class="vocab-word" data-word="consolidating">consolidating</span> facts and reinforcing how to perform tasks. It also <span class="vocab-word" data-word="rejuvenates">rejuvenates</span> us both physically and mentally.</p>

                                <ul class="list-disc list-inside space-y-4 text-gray-800">
                                    <li class="q-item" id="container-s1_q1">keep times of highest <strong class="text-blue-600">1</strong> <input type="text" name="s1_q1" class="fill-in-blank" autocomplete="off"> for most important work</li>
                                    <li class="q-item" id="container-s1_q2">do not send an email that requires a non-urgent <strong class="text-blue-600">2</strong> <input type="text" name="s1_q2" class="fill-in-blank" autocomplete="off"> until main work done</li>

                        <!-- Table Completion -->
                        <div class="mb-8 p-6 bg-white rounded-2xl shadow-sm border border-gray-100">
                            <div class="flex items-center mb-4">
                                <span class="bg-blue-100 text-blue-800 text-sm font-bold px-3 py-1 rounded-full mr-3">Questions 5-9</span>
                                <h4 class="font-bold text-gray-800">Complete the table below.</h4>
                            </div>
                            <p class="mb-6 text-gray-700 bg-gray-50 p-4 rounded-lg border border-gray-100">
                                Choose <strong>NO MORE THAN TWO WORDS AND/OR A NUMBER</strong> from the passage for each answer.
                            </p>
                            
                            <h5 class="font-bold text-lg text-center text-gray-800 mb-4">Brain boosting</h5>
                            <div class="overflow-x-auto">
                                <table class="ielts-table text-sm">
                                    <thead>
                                        <tr>
                                            <th></th>
                                            <th>ADVICE</th>
                                            <th>BENEFITS</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td class="font-semibold">Exercise</td>
                                            <td class="q-item" id="container-s1_q5"><strong class="text-blue-600">5</strong> <input type="text" name="s1_q5" class="fill-in-blank w-24" autocomplete="off"> not necessary<br><br>run up steps or on foot</td>
                                            <td class="q-item" id="container-s1_q6">reduces <strong class="text-blue-600">6</strong> <input type="text" name="s1_q6" class="fill-in-blank w-24" autocomplete="off"> ; improves mood</td>
                                        </tr>
                                        <tr>
                                            <td class="font-semibold">Food</td>
                                            <td class="q-item" id="container-s1_q7">have breakfast rich in <strong class="text-blue-600">7</strong> <input type="text" name="s1_q7" class="fill-in-blank w-24" autocomplete="off"><br><br>stop eating when <strong class="text-blue-600" id="container-s1_q8">8</strong> <input type="text" name="s1_q8" class="fill-in-blank w-24" autocomplete="off"> full</td>
                                            <td>makes you calmer and more alert<br><br>you achieve more when a bit hungry</td>
                                        </tr>
                                        <tr>
                                            <td class="font-semibold">Study/Work area</td>
                                            <td>remove unnecessary mess from your workspace</td>
                                            <td class="q-item" id="container-s1_q9">prevents attention wandering; allows more freedom of <strong class="text-blue-600">9</strong> <input type="text" name="s1_q9" class="fill-in-blank w-24" autocomplete="off"></td>
                                        </tr>

                                </table>

                    `
                }
            ]
        }
    };

    // --- APPLICATION LOGIC ---
    document.addEventListener('DOMContentLoaded', () => {
        const app = {
            // State
            userAnswers: {},
            currentSection: 0,
            currentFontSize: 17,

            // Elements
            leftPane: document.getElementById('left-pane'),
            rightPane: document.getElementById('right-pane'),
            questionsSection: document.getElementById('questions-section'),
            splitter: document.getElementById('splitter'),
            sectionTabsContainer: document.getElementById('section-tabs'),
            passageIndicator: document.getElementById('passage-indicator'),
            highlightTooltip: document.getElementById('highlight-tooltip'),
            vocabModal: document.getElementById('vocab-modal'),
            vocabModalContent: document.getElementById('vocab-modal-content'),
            closeVocabModalBtn: document.getElementById('close-vocab-modal'),
            vocabWordEl: document.getElementById('vocab-word'),
            vocabMeaningEl: document.getElementById('vocab-meaning'),
            vocabPronunciationText: document.getElementById('vocab-pronunciation-text'),
            playAudioBtn: document.getElementById('play-audio-btn'),

            init() {
                this.setupEventListeners();
                this.loadContent();
                this.initSplitter();
                this.initHighlighter();
            },

            setupEventListeners() {
                // Font Size Events
                document.getElementById('increase-font-btn').addEventListener('click', () => this.changeFontSize(1));
                document.getElementById('decrease-font-btn').addEventListener('click', () => this.changeFontSize(-1));

                // Close modal events
                this.closeVocabModalBtn.addEventListener('click', () => this.closeModal());
                this.vocabModal.addEventListener('click', (e) => {
                   if (e.target === this.vocabModal) this.closeModal();
                });

                // Input delegator for saving answers
                document.body.addEventListener('input', (e) => this.handleInput(e));
                
                // Vocab Words Event Delegation
                this.leftPane.addEventListener('click', (e) => {
                    if (e.target.classList.contains('vocab-word')) {
                        const wordKey = e.target.dataset.word;
                        this.openVocabModal(wordKey);
                    }
                });
                
                // Real Audio Pronunciation Event
                this.playAudioBtn.addEventListener('click', () => {
                   const word = this.vocabWordEl.textContent;
                   if (!word) return;
                   
                   if ('speechSynthesis' in window) {
                       window.speechSynthesis.cancel();
                   }
                   
                   this.playAudioBtn.classList.remove('text-blue-600', 'bg-blue-50');
                   this.playAudioBtn.classList.add('bg-green-500', 'text-white');
                   
                   if ('speechSynthesis' in window) {
                       const utterance = new SpeechSynthesisUtterance(word);
                       utterance.lang = 'en-GB'; 
                       utterance.rate = 0.9; 
                       
                       utterance.onend = () => {
                           this.playAudioBtn.classList.add('text-blue-600', 'bg-blue-50');
                           this.playAudioBtn.classList.remove('bg-green-500', 'text-white');
                       };
                       
                       utterance.onerror = () => {
                           this.playAudioBtn.classList.add('text-blue-600', 'bg-blue-50');
                           this.playAudioBtn.classList.remove('bg-green-500', 'text-white');
                       };
                       
                       window.speechSynthesis.speak(utterance);
                   } else {
                       alert("Sorry, your browser doesn't support text-to-speech audio.");
                       setTimeout(() => {
                           this.playAudioBtn.classList.add('text-blue-600', 'bg-blue-50');
                           this.playAudioBtn.classList.remove('bg-green-500', 'text-white');
                       }, 500);
                   }
                });
            },
            
            changeFontSize(delta) {
                this.currentFontSize += delta;
                if (this.currentFontSize < 14) this.currentFontSize = 14;
                if (this.currentFontSize > 26) this.currentFontSize = 26;
                document.documentElement.style.setProperty('--app-font-size', `${this.currentFontSize}px`);
            },

            openVocabModal(wordKey) {
                const data = vocabulary[wordKey];
                if (data) {
                    this.vocabWordEl.textContent = wordKey;
                    this.vocabMeaningEl.textContent = data.meaning;
                    this.vocabPronunciationText.textContent = data.phonetic || '';
                    this.vocabModal.classList.remove('hidden');
                    setTimeout(() => {
                        this.vocabModalContent.classList.remove('scale-95', 'opacity-0');
                        this.vocabModalContent.classList.add('scale-100', 'opacity-100');
                    }, 10);
                }
            },

            closeModal() {
                if ('speechSynthesis' in window) {
                   window.speechSynthesis.cancel();
                }
                this.vocabModalContent.classList.remove('scale-100', 'opacity-100');
                this.vocabModalContent.classList.add('scale-95', 'opacity-0');
                this.playAudioBtn.classList.add('text-blue-600', 'bg-blue-50');
                this.playAudioBtn.classList.remove('bg-green-500', 'text-white');
                
                setTimeout(() => {
                    this.vocabModal.classList.add('hidden');
                }, 200);
            },
            
            handleInput(e) {
                if (e.target.name && e.target.type === 'text') {
                    this.userAnswers[e.target.name] = e.target.value;
                }
            },

            restoreAnswers() {
                for (const qId in this.userAnswers) {
                    const value = this.userAnswers[qId];
                    const input = document.querySelector(`input[name="${qId}"]`);
                    
                    if (input && input.type === 'text') {
                        input.value = value;
                    }
                }
            },

            loadContent() {
                const data = testData.reading;
                const sectionData = data.sections[this.currentSection];

                // Load left and right panes
                this.leftPane.innerHTML = `<div class="reading-passage">${sectionData.passage}</div>`;
                this.questionsSection.innerHTML = sectionData.questions;

                // Load Navigation Tabs
                this.sectionTabsContainer.innerHTML = data.sections.map((sec, index) =>
                    `<button class="px-4 py-1.5 ${index === this.currentSection ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'} rounded-md text-sm font-semibold shadow-sm transition-colors section-tab-btn" data-section="${index}">Passage ${index + 1}</button>`
                ).join('');

                // Assign Tab Switching Events
                this.sectionTabsContainer.querySelectorAll('.section-tab-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.currentSection = parseInt(e.target.dataset.section);
                        // Reset scroll
                        this.leftPane.scrollTop = 0;
                        this.rightPane.scrollTop = 0;
                        this.loadContent();
                    });
                });
                
                // Update text indicator
                this.passageIndicator.textContent = `Passage ${this.currentSection + 1} of ${data.sections.length}`;

                // Restore previously answered questions visually
                this.restoreAnswers();
            },

            initSplitter() {
                let isDragging = false;
                const contentPanes = document.getElementById('content-panes');

                this.splitter.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    isDragging = true;
                    document.body.style.cursor = 'col-resize';
                });

                document.addEventListener('mousemove', (e) => {
                    if (!isDragging) return;
                    e.preventDefault();
                    if (window.innerWidth <= 768) return; 
                    
                    const containerRect = contentPanes.getBoundingClientRect();
                    const newLeftWidth = e.clientX - containerRect.left;
                    if (newLeftWidth > 200 && newLeftWidth < containerRect.width - 200) {
                        const newLeftPercent = (newLeftWidth / containerRect.width) * 100;
                        contentPanes.style.gridTemplateColumns = `${newLeftPercent}% 5px 1fr`;
                    }
                });

                document.addEventListener('mouseup', () => {
                    if (isDragging) {
                        isDragging = false;
                        document.body.style.cursor = 'default';
                    }
                });
            },

            initHighlighter() {
                document.body.addEventListener('mouseup', (e) => {
                    const selection = window.getSelection();
                    const selectedText = selection.toString().trim();

                    if (selectedText.length > 0) {
                        const range = selection.getRangeAt(0);
                        if (!this.leftPane.contains(range.commonAncestorContainer) && !this.rightPane.contains(range.commonAncestorContainer)) {
                           this.highlightTooltip.style.display = 'none';
                           return;
                        }

                        this.highlightTooltip.style.left = `${e.pageX - 30}px`;
                        this.highlightTooltip.style.top = `${e.pageY - 40}px`;
                        this.highlightTooltip.style.display = 'block';

                        this.highlightTooltip.onclick = () => {
                            const container = range.commonAncestorContainer;
                            if (container.nodeType === 3) { 
                                if (range.startContainer.parentElement !== range.endContainer.parentElement) {
                                    this.highlightTooltip.style.display = 'none';
                                    return;
                                }
                            }
                            
                            const mark = document.createElement('mark');
                            try {
                                range.surroundContents(mark);
                            } catch (ex) {
                            } finally {
                                selection.removeAllRanges();
                                this.highlightTooltip.style.display = 'none';
                            }
                        };
                    } else {
                        this.highlightTooltip.style.display = 'none';
                    }
                });

                document.body.addEventListener('mousedown', (e) => {
                   if (e.target !== this.highlightTooltip && window.getSelection().toString().length === 0) {
                        this.highlightTooltip.style.display = 'none';
                   }
                });
            }
        };

        app.init();
    });
</script>
